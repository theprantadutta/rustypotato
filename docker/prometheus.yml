global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

scrape_configs:
  - job_name: 'rustypotato'
    static_configs:
      # Port = main port + 1000 (the bin's MonitoringServer convention).
      # If you change the main port in rustypotato.toml, change this too.
      - targets: ['rustypotato:7379']
    scrape_interval: 5s
    metrics_path: /metrics
    
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']