name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUST_LOG: warn

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    strategy:
      # Don't fail the whole matrix on a single toolchain hiccup
      # (nightly was previously dropped because the unstable lints
      # / soundness churn made it a frequent flake source).
      fail-fast: false
      matrix:
        rust:
          - stable
          - beta
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ matrix.rust }}
        components: rustfmt, clippy
    
    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Check formatting
      run: cargo fmt --all -- --check
      if: matrix.rust == 'stable'
    
    - name: Run clippy
      run: cargo clippy --all-targets --all-features -- -D warnings
      if: matrix.rust == 'stable'
    
    - name: Run tests
      run: cargo test --verbose --all-features
      timeout-minutes: 10
    
    - name: Run integration tests
      run: cargo test --test '*' --verbose -- --test-threads=1
      timeout-minutes: 15
      if: matrix.rust == 'stable'
    
    - name: Run benchmarks (check only)
      run: cargo bench --no-run
      if: matrix.rust == 'stable'

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: llvm-tools-preview
    
    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-coverage-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Install cargo-llvm-cov
      uses: taiki-e/install-action@cargo-llvm-cov
    
    - name: Clean previous coverage data
      run: cargo llvm-cov clean --workspace
      continue-on-error: true
    
    - name: Generate code coverage (lib only)
      run: |
        cargo llvm-cov --lib --all-features --lcov --output-path lcov.info
      continue-on-error: true
    
    - name: Generate code coverage (fallback with tarpaulin)
      if: failure()
      run: |
        cargo install cargo-tarpaulin
        cargo tarpaulin --verbose --all-features --workspace --timeout 120 \
          --exclude-files 'tests/*' --exclude-files 'benches/*' \
          --out lcov --output-dir .
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: lcov.info
        fail_ci_if_error: false
        verbose: true
        token: ${{ secrets.CODECOV_TOKEN }}

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    # `actions-rs/audit-check@v1` is unmaintained (last release 2021,
    # has known issues with current Cargo.lock formats). Use the
    # rustsec-maintained installer to fetch a current `cargo-audit`
    # and run it directly.
    - name: Install cargo-audit
      uses: taiki-e/install-action@v2
      with:
        tool: cargo-audit

    - name: Run cargo-audit
      run: cargo audit
      continue-on-error: true

  build:
    name: Build Check
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
    
    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Build
      run: cargo build --release --verbose
    
    - name: Test binaries
      run: |
        ./target/release/rustypotato-server --help
        ./target/release/rustypotato-cli --help
      shell: bash